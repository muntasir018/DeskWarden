<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1e1245"/>
      <stop offset="100%" stop-color="#0d0a1f"/>
    </radialGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <radialGradient id="shieldGlow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="keyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#e9d5ff"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <filter id="shieldShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#7c3aed" flood-opacity="0.45"/>
    </filter>
    <filter id="boxGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#ede9ff" flood-opacity="0.15"/>
    </filter>
    <filter id="keyholeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#ffffff" flood-opacity="0.65"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.35"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" rx="44" fill="url(#bgGrad)"/>
  <rect width="500" height="500" rx="44" fill="url(#vignette)"/>

  <!-- Ambient glow -->
  <ellipse cx="250" cy="200" rx="130" ry="110" fill="#7c3aed" opacity="0.12"/>

  <!-- SHIELD -->
  <g filter="url(#shieldShadow)">
    <path d="M148,82 C148,60 164,44 188,44 L312,44 C336,44 352,60 352,82 L352,195 C352,278 306,324 250,348 C194,324 148,278 148,195 Z"
      fill="url(#shieldGrad)"/>
    <path d="M148,82 C148,60 164,44 188,44 L312,44 C336,44 352,60 352,82 L352,195 C352,278 306,324 250,348 C194,324 148,278 148,195 Z"
      fill="url(#shieldGlow)"/>
    <!-- Glass shine (upper half only) -->
    <path d="M148,82 C148,60 164,44 188,44 L312,44 C336,44 352,60 352,82 L352,155 C310,174 280,180 250,180 C220,180 190,174 148,155 Z"
      fill="url(#shineGrad)"/>
    <path d="M148,82 C148,60 164,44 188,44 L312,44 C336,44 352,60 352,82 L352,195 C352,278 306,324 250,348 C194,324 148,278 148,195 Z"
      fill="none" stroke="#c4b5fd" stroke-width="1.5" stroke-opacity="0.5"/>
  </g>

  <!-- Inner bezel -->
  <g filter="url(#boxGlow)">
    <rect x="182" y="70" width="136" height="136" rx="22"
      fill="#0f0c24" stroke="#c4b5fd" stroke-width="1.5" stroke-opacity="0.35"/>
    <rect x="182" y="70" width="136" height="28" rx="22"
      fill="#ffffff" fill-opacity="0.05"/>
  </g>

  <!-- Keyhole: matched to icon_only proportions -->
  <defs>
    <clipPath id="keyholeClip">
      <circle cx="250" cy="118" r="20"/>
      <path d="M239,128 L261,128 L256,188 L244,188 Z"/>
    </clipPath>
  </defs>
  <g filter="url(#keyholeGlow)">
    <rect x="226" y="94" width="48" height="94" fill="url(#keyGrad)" clip-path="url(#keyholeClip)"/>
  </g>

  <!-- Wordmark -->
  <text x="250" y="430" text-anchor="middle"
        font-family="'Segoe UI', 'Inter', Arial, sans-serif"
        font-size="50" font-weight="700" letter-spacing="0.5">
    <tspan fill="#ede9ff">Desk</tspan><tspan fill="#a78bfa">Warden</tspan>
  </text>
  <!-- Accent line -->
  <line x1="148" y1="443" x2="352" y2="443"
    stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.5" stroke-linecap="round"/>
</svg>
